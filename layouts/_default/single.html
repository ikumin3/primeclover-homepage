{{ define "main" }}
<article class="container">
  <header class="article-header">
    <h1>{{ .Title }}</h1>
    {{ with .Date }}<time>{{ .Format "2006-01-02" }}</time>{{ end }}
    {{ with .Params.tags }}
      <div class="tags">
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
      </div>
    {{ end }}
  </header>

  {{ with .Params.image }}
    <figure class="featured-image">
      <img src="{{ . | relURL }}" alt="{{ $.Title }}">
    </figure>
  {{ end }}

  <div class="article-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
